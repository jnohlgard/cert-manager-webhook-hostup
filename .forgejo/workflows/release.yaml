name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: codeberg.org
  IMAGE: codeberg.org/${{ github.repository }}
  HELM_REGISTRY: codeberg.org/${{ github.repository_owner }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Log in to Codeberg Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package and push Helm chart
        run: |
          VERSION=${{ steps.version.outputs.version }}
          helm package helm/hostup-webhook \
            --version $VERSION \
            --app-version $VERSION \
            --destination _out/
          helm push _out/hostup-webhook-$VERSION.tgz oci://${{ env.HELM_REGISTRY }}
