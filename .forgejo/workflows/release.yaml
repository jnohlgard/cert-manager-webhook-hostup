name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: codeberg.org
  IMAGE: codeberg.org/${{ github.repository }}
  HELM_REGISTRY: codeberg.org/${{ github.repository_owner }}

jobs:
  release:
    runs-on: codeberg-medium-lazy
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Log in to Codeberg Container Registry
        run: |
          buildah login \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            ${{ env.REGISTRY }}

      - name: Build and push Docker image
        run: |
          VERSION=${{ steps.version.outputs.version }}
          buildah build \
            -t ${{ env.IMAGE }}:${VERSION} \
            -t ${{ env.IMAGE }}:latest \
            .
          buildah push ${{ env.IMAGE }}:${VERSION}
          buildah push ${{ env.IMAGE }}:latest

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package and push Helm chart
        run: |
          VERSION=${{ steps.version.outputs.version }}
          helm package helm/hostup-webhook \
            --version $VERSION \
            --app-version $VERSION \
            --destination _out/
          helm push _out/hostup-webhook-$VERSION.tgz oci://${{ env.HELM_REGISTRY }}
