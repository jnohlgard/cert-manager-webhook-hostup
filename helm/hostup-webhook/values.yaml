# groupName is used as the Kubernetes API group name for this webhook.
# It must be a domain you own and must match the groupName referenced in
# each Issuer or ClusterIssuer that uses this solver.
groupName: acme.hostup.se

certManager:
  namespace: cert-manager
  serviceAccountName: cert-manager

image:
  repository: ghcr.io/hostup/cert-manager-webhook-hostup
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 443

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #  cpu: 100m
  #  memory: 128Mi
  # requests:
  #  cpu: 100m
  #  memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  privileged: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

apiService:
  # enabled controls whether the APIService cluster-scoped resource is created.
  enabled: true

rbac:
  authDelegator:
    # enabled controls whether the ClusterRoleBinding to system:auth-delegator is created.
    enabled: true
  webhookAuthReader:
    # enabled controls whether the RoleBinding in kube-system for the webhook
    # authentication reader is created.
    enabled: true
  domainSolver:
    # enabled controls whether the ClusterRole and ClusterRoleBinding allowing
    # cert-manager to call the webhook API are created.
    enabled: true
  secretReader:
    # enabled controls whether the ClusterRole and per-namespace RoleBindings
    # granting the webhook secret read access are created.
    enabled: true

# secretNamespaces lists the namespaces the webhook is allowed to read secrets
# from. Defaults to the release namespace if empty.
# Only used when rbac.secretReader.enabled is true.
secretNamespaces: []

# secretNames optionally limits secret read access to these Secret names in each
# configured secret namespace. Leave empty to allow get access to any Secret in
# those namespaces.
secretNames: []

nodeSelector: {}

tolerations: []

affinity: {}
