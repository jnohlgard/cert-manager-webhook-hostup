apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "hostup-webhook.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "hostup-webhook.labels" . | nindent 4 }}
  {{- with .Values.serviceAccountAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if .Values.rbac.webhookAuthReader.enabled }}
---
# Grant the webhook permission to read the ConfigMap containing the Kubernetes
# apiserver's requestheader-ca-certificate.
# This ConfigMap is automatically created by the Kubernetes apiserver.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "hostup-webhook.fullname" . }}:webhook-authentication-reader
  namespace: kube-system
  labels:
    {{- include "hostup-webhook.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "hostup-webhook.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.rbac.authDelegator.enabled }}
---
# apiserver gets the auth-delegator role to delegate auth decisions to
# the core apiserver
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "hostup-webhook.fullname" . }}:auth-delegator
  labels:
    {{- include "hostup-webhook.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "hostup-webhook.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.rbac.domainSolver.enabled }}
---
# Grant cert-manager permission to validate using our apiserver
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "hostup-webhook.fullname" . }}:domain-solver
  labels:
    {{- include "hostup-webhook.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - {{ .Values.groupName }}
    resources:
      - '*'
    verbs:
      - 'create'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "hostup-webhook.fullname" . }}:domain-solver
  labels:
    {{- include "hostup-webhook.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "hostup-webhook.fullname" . }}:domain-solver
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ .Values.certManager.serviceAccountName }}
    namespace: {{ .Values.certManager.namespace }}
{{- end }}
{{- if .Values.rbac.secretReader.enabled }}
{{- $secretNamespaces := .Values.secretNamespaces | default (list .Release.Namespace) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "hostup-webhook.fullname" . }}:secret-reader
  labels:
    {{- include "hostup-webhook.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
      - configmaps
    verbs:
      - get
    {{- with .Values.secretNames }}
    resourceNames:
      {{- toYaml . | nindent 6 }}
    {{- end }}
{{- range $secretNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "hostup-webhook.fullname" $ }}:secret-reader
  namespace: {{ . | quote }}
  labels:
    {{- include "hostup-webhook.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "hostup-webhook.fullname" $ }}:secret-reader
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "hostup-webhook.fullname" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
